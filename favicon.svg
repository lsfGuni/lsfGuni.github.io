<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#2496ED"/>
  <!-- Whale body -->
  <ellipse cx="30" cy="38" rx="20" ry="10" fill="#fff"/>
  <!-- Whale head -->
  <circle cx="46" cy="33" r="7.5" fill="#fff"/>
  <!-- Whale tail -->
  <polygon points="12,38 6,28 8,32 11,35 8,41 6,46 12,42" fill="#fff"/>
  <!-- Whale eye -->
  <circle cx="47.5" cy="31.5" r="1.3" fill="#2496ED"/>
  <!-- Containers row 1 (bottom) -->
  <rect x="18" y="31" width="5" height="3.8" rx="0.6" fill="#2496ED" stroke="#fff" stroke-width="0.3"/>
  <rect x="24" y="31" width="5" height="3.8" rx="0.6" fill="#2496ED" stroke="#fff" stroke-width="0.3"/>
  <rect x="30" y="31" width="5" height="3.8" rx="0.6" fill="#2496ED" stroke="#fff" stroke-width="0.3"/>
  <rect x="36" y="31" width="5" height="3.8" rx="0.6" fill="#2496ED" stroke="#fff" stroke-width="0.3"/>
  <!-- Containers row 2 (top) -->
  <rect x="24" y="26.5" width="5" height="3.8" rx="0.6" fill="#2496ED" stroke="#fff" stroke-width="0.3"/>
  <rect x="30" y="26.5" width="5" height="3.8" rx="0.6" fill="#2496ED" stroke="#fff" stroke-width="0.3"/>
  <!-- Water waves -->
  <path d="M8,48 q4,-2.5 8,0 q4,2.5 8,0 q4,-2.5 8,0 q4,2.5 8,0 q4,-2.5 8,0" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <path d="M5,52 q4,-2 8,0 q4,2 8,0 q4,-2 8,0 q4,2 8,0 q4,-2 8,0 q4,2 8,0" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.3"/>
</svg>
